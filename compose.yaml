services:
  pgvector:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: seam-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seam}
      POSTGRES_USER: ${POSTGRES_USER:-seam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${SEAM_PGVECTOR_PORT:-5432}:5432"
    volumes:
      - seam-pgvector-data:/var/lib/postgresql
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  seam-pgvector-data:
