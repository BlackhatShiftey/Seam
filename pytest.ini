[pytest]
testpaths =
    test_seam_all
    tools/history
    tools/streams
    tests
addopts = -q --strict-markers
markers =
    slow: marks tests that take more than 5 seconds
    external: tests that hit external services (pgvector, network)
norecursedirs =
    build
    .claude
    .lingma
    .seam
    seam_runtime/_handoff_20260419
